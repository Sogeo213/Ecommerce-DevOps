name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        # រង់ចាំឱ្យ Postgres បើកដំណើរការខ្លួនរួចរាល់
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      env:
        DB_NAME: postgres
        DB_USER: postgres
        DB_PASSWORD: postgres_password
        DB_HOST: localhost
        DB_PORT: 5432
        SECRET_KEY: "ci-test-secret-key-just-for-testing"
        DEBUG: "True"
      run: |
        python manage.py test products