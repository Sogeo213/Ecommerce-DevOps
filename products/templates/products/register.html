<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Socheat Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow border-0" style="width: 450px;">
        <h3 class="fw-bold text-center mb-4">Create Account</h3>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-2">
                    <label class="form-label small fw-bold">{{ field.label }}</label>
                    {{ field }}
                    <div class="form-text text-muted" style="font-size: 0.75rem;">{{ field.help_text }}</div>
                    <span class="text-danger small">{{ field.errors }}</span>
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-dark w-100 fw-bold py-2 mt-3">Register</button>
        </form>
        <p class="text-center small text-muted mt-3 mb-0">Already have an account? <a href="{% url 'login' %}" class="text-success fw-bold text-decoration-none">Login here</a></p>
    </div>

    <script>
        document.querySelectorAll('input:not([type="hidden"])').forEach(input => input.classList.add('form-control'));
    </script>
</body>
</html>
