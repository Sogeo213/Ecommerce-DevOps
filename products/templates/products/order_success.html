<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - Socheat Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-5 text-center shadow border-0 style="max-width: 500px;">
        <div class="mb-3 text-success" style="font-size: 4rem;">🎉</div>
        <h2 class="fw-bold text-dark">Thank You For Your Purchase!</h2>
        <p class="text-muted my-3">Your order has been recorded successfully. Our team will contact you shortly.</p>
        <div class="alert alert-secondary py-2 fw-bold fs-6">Order ID: #{{ order_id }}</div>
        <a href="{% url 'product_list' %}" class="btn btn-success fw-bold px-4 py-2 mt-2">Back to Shopping</a>
    </div>
</body>
</html>
